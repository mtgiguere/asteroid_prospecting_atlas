# ci.yml

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: asteroid_atlas
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U atlas -d asteroid_atlas"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql+psycopg://atlas:atlas_dev_password@localhost:5432/asteroid_atlas

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Initialize database schema
        run: |
          python -m asteroid_atlas.db.init_db

      - name: Run vulnerability scan
        run: |
          pip-audit

      - name: Run lint checks
        run: |
          ruff check .
          ruff format --check .

      - name: Run unit tests
        run: |
          pytest