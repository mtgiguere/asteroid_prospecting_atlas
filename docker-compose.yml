# docker-compose.yml

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: asteroid_atlas_db
    restart: unless-stopped

    environment:
      POSTGRES_DB: asteroid_atlas
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas_dev_password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: